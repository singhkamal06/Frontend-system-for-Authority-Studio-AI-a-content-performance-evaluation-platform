name: Generate Prerender Snapshots

on:
  schedule:
    - cron: '0 3 * * 0'   # Every Sunday 03:00 UTC
  workflow_dispatch: {}    # Manual trigger anytime

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Step 1: Regenerate sitemap from published articles ─────────────────
      # Runs before Playwright so Googlebot gets the fresh sitemap immediately.
      - name: Regenerate sitemap.xml
        run: node generate-sitemap.cjs

      - name: Commit updated sitemap (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: update sitemap.xml [skip ci]"
          git push || true

      # ── Step 2: Pre-render all public routes ──────────────────────────────
      - name: Install dependencies
        run: npm install playwright @supabase/supabase-js

      - name: Install headless Chromium
        run: npx playwright install --with-deps chromium

      - name: Run snapshot generator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node generate-snapshots.cjs
