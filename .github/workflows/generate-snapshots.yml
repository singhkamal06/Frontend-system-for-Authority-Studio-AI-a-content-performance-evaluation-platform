name: Generate Prerender Snapshots

# Runs every Sunday at 03:00 UTC. Weekly, not nightly — your marketing
# pages don't change often enough to justify daily egress cost, and
# crawlers seeing content that's up to 7 days stale is a fine tradeoff
# against the alternative (crawlers seeing nothing at all).
#
# You can also trigger it manually any time from the GitHub Actions tab
# (workflow_dispatch below) — e.g. right after you ship a homepage/pricing
# copy change, so the snapshot doesn't wait a week to catch up.
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch: {}

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright @supabase/supabase-js

      - name: Install headless Chromium
        run: npx playwright install --with-deps chromium

      - name: Run snapshot generator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node generate-snapshots.js
