# .github/workflows/weekly-draft.yml
#
# Runs every Monday at 09:00 UTC.
# Pops the first topic from topic-queue.json, generates a full article draft,
# and opens a Pull Request for your review.
#
# You review the PR, edit if needed, merge when satisfied.
# The nightly generate-snapshots workflow picks it up automatically after merge.
#
# Required GitHub secrets:
#   OPENAI_API_KEY          — already in your stack
#   SUPABASE_URL            — already set
#   SUPABASE_SERVICE_ROLE_KEY — already set
#
# Optional (enables auto-trigger of snapshot workflow on publish):
#   GITHUB_TOKEN            — automatically available in Actions, no setup needed

name: Weekly Blog Draft

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 09:00 UTC
  workflow_dispatch: {}    # Manual trigger from GitHub Actions tab anytime

jobs:
  generate-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check topic queue
        id: queue-check
        run: |
          if [ ! -f topic-queue.json ]; then
            echo "❌ topic-queue.json not found — create it with at least one topic."
            exit 1
          fi
          QUEUE_LENGTH=$(node -e "const q = require('./topic-queue.json'); console.log(q.length);")
          echo "queue_length=$QUEUE_LENGTH" >> $GITHUB_OUTPUT
          if [ "$QUEUE_LENGTH" -eq "0" ]; then
            echo "📭 Topic queue is empty — skipping this week."
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
            TOPIC=$(node -e "const q = require('./topic-queue.json'); console.log(q[0]);")
            echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          fi

      - name: Skip if queue empty
        if: steps.queue-check.outputs.empty == 'true'
        run: |
          echo "Queue is empty. Add topics to topic-queue.json and re-run."
          exit 0

      - name: Generate article draft
        if: steps.queue-check.outputs.empty == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          TOPIC="${{ steps.queue-check.outputs.topic }}"
          echo "🖊️  Generating draft for: $TOPIC"
          node blog.cjs --new "$TOPIC" --auto

      - name: Pop topic from queue
        if: steps.queue-check.outputs.empty == 'false'
        run: |
          node -e "
            const fs = require('fs');
            const q = JSON.parse(fs.readFileSync('topic-queue.json', 'utf8'));
            q.shift();
            fs.writeFileSync('topic-queue.json', JSON.stringify(q, null, 2));
            console.log('Remaining topics in queue:', q.length);
          "

      - name: Get generated slug
        if: steps.queue-check.outputs.empty == 'false'
        id: get-slug
        run: |
          # Find the most recently created article file
          SLUG=$(ls -t blog/articles/*.js 2>/dev/null | head -1 | xargs basename | sed 's/\.js$//')
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "Generated slug: $SLUG"

      - name: Create draft branch and PR
        if: steps.queue-check.outputs.empty == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLUG="${{ steps.get-slug.outputs.slug }}"
          BRANCH="draft/blog-${SLUG}-$(date +%Y%m%d)"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add blog/articles/ blogData.js topic-queue.json
          git commit -m "Draft: blog article — ${SLUG}"
          git push origin "$BRANCH"

          # Read article metadata for PR description
          TITLE=$(node -e "
            const raw = require('fs').readFileSync('blog/articles/${SLUG}.js', 'utf8');
            const m = raw.match(/title:\s*'([^']*)'/);
            console.log(m ? m[1] : '${SLUG}');
          ")
          META_DESC=$(node -e "
            const raw = require('fs').readFileSync('blog/articles/${SLUG}.js', 'utf8');
            const m = raw.match(/metaDescription:\s*'([^']*)'/);
            console.log(m ? m[1] : '');
          ")
          TARGET_QUERY=$(node -e "
            const raw = require('fs').readFileSync('blog/articles/${SLUG}.js', 'utf8');
            const m = raw.match(/targetQuery:\s*'([^']*)'/);
            console.log(m ? m[1] : '');
          ")
          EXCERPT=$(node -e "
            const raw = require('fs').readFileSync('blog/articles/${SLUG}.js', 'utf8');
            const m = raw.match(/excerpt:\s*'([^']*)'/);
            console.log(m ? m[1] : '');
          ")

          gh pr create \
            --title "📝 Draft: ${TITLE}" \
            --body "## Article Draft — Review Before Merging

**Slug:** \`${SLUG}\`
**Target query:** ${TARGET_QUERY}
**Meta title:** ${TITLE}
**Meta description:** ${META_DESC}

**Excerpt:**
${EXCERPT}

---

## Review checklist

- [ ] Opening paragraph makes a specific, contestable claim
- [ ] Target query appears naturally in the first 100 words
- [ ] At least one named mechanism or concrete example per section
- [ ] Authority Studio AI referenced naturally — not as an ad
- [ ] No filler transitions (Furthermore, In conclusion, etc.)
- [ ] Ends with a specific actionable next step
- [ ] Read the full article — edit directly in this PR if needed

## After merging

The nightly \`generate-snapshots\` workflow will pre-render \`/blog/${SLUG}\` automatically.
Then request indexing in GSC: \`https://authoritystudioai.com/blog/${SLUG}\`

**Article file:** \`blog/articles/${SLUG}.js\`
**Live URL (after merge + snapshot):** https://authoritystudioai.com/blog/${SLUG}" \
            --base main \
            --head "$BRANCH"

          echo "✅ Pull Request created for review."
